name: Deploy GCP Infrastructure
on: workflow_dispatch

jobs:
  deploy-vm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
      - uses: google-github-actions/setup-gcloud@v2

      - name: Build Clean Infrastructure
        run: |
          # 1. Create custom VPC
          gcloud compute networks create my-dualstack-vpc --subnet-mode=custom --quiet || true

          # 2. Create Subnet (needed for the VM)
          gcloud compute networks subnets create dualstack-subnet \
            --network=my-dualstack-vpc \
            --region=us-east1 \
            --range=10.0.0.0/24 \
            --quiet || true

          # 3. CRITICAL: Firewall Rule (Without this, you cannot SSH)
          gcloud compute firewall-rules create allow-ssh-ingress \
            --network=my-dualstack-vpc \
            --allow=tcp:22 \
            --source-ranges=0.0.0.0/0 \
            --quiet || true

          # 4. Create the VM
          # We use --no-user-output-enabled to keep logs clean
          gcloud compute instances create www-ryanrothwell-ca \
            --zone=us-east1-b \
            --machine-type=e2-micro \
            --subnet=dualstack-subnet \
            --image-family=rocky-linux-9-optimized-gcp \
            --image-project=rocky-linux-cloud \
            --quiet
